name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs on feature branches and PRs; keep main runs intact so
# we never abort a deploy mid-flight.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "1"

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: clippy
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: test
      # Verify the Docker daemon — testcontainer-based integration tests
      # spin up Postgres / Redis / NATS on demand.
      - run: docker info
      - run: cargo test --workspace --no-fail-fast --locked

  docker-build:
    name: docker build (Dockerfile.all-in-one)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.all-in-one
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy (railway redeploy)
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://elena-server.up.railway.app
    timeout-minutes: 15
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest
      - name: Inject git SHA for /info endpoint
        # Dockerfile.all-in-one COPYs .git-sha and exports it as
        # VERGEN_GIT_SHA at cargo build time. Without this step the
        # deployed binary reports "unknown" — the committed default.
        run: echo "${{ github.sha }}" > .git-sha
      - name: Deploy to Railway
        env:
          # Account / workspace token. Critical: only set
          # RAILWAY_API_TOKEN — if RAILWAY_TOKEN is also set, the Railway
          # CLI validates it first as a *project* token, fails with
          # "Invalid RAILWAY_TOKEN", and never falls back. The explicit
          # --project / --service / --environment flags target the deploy.
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          if [ -z "${RAILWAY_API_TOKEN}" ]; then
            echo "::error::RAILWAY_API_TOKEN is not set on the production environment. Generate a token at https://railway.com/account/tokens and add it under Settings → Environments → production." >&2
            exit 1
          fi
          railway --version
          railway up --detach \
            --project 50b379da-82af-42a5-b88f-fc76a2c3dfc2 \
            --service 07e3776c-6b83-41c6-a158-661f9c3022c2 \
            --environment production
