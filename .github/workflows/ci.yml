name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs on feature branches and PRs; keep main runs intact so
# we never abort a deploy mid-flight.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "1"

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: clippy
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: test
      # Verify the Docker daemon — testcontainer-based integration tests
      # spin up Postgres / Redis / NATS on demand.
      - run: docker info
      - run: cargo test --workspace --no-fail-fast --locked

  docker-build:
    name: docker build (Dockerfile.all-in-one)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.all-in-one
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy (railway redeploy)
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://elena-server.up.railway.app
    timeout-minutes: 15
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest
      - name: Deploy to Railway
        env:
          # The Railway CLI reads project tokens from RAILWAY_TOKEN and
          # account tokens from RAILWAY_API_TOKEN. Accept either secret
          # name (operators have stored it under both at various points)
          # and surface it under both env-var names so the CLI picks
          # whichever it expects. The explicit --project / --service /
          # --environment flags pin the deploy target regardless.
          TOKEN: ${{ secrets.RAILWAY_API_TOKEN || secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::error::No Railway token in production env. Add RAILWAY_API_TOKEN (account-scoped) or RAILWAY_TOKEN (project-scoped) under Settings → Environments → production." >&2
            exit 1
          fi
          export RAILWAY_TOKEN="$TOKEN"
          export RAILWAY_API_TOKEN="$TOKEN"
          railway --version
          railway up --detach \
            --project 50b379da-82af-42a5-b88f-fc76a2c3dfc2 \
            --service 07e3776c-6b83-41c6-a158-661f9c3022c2 \
            --environment production
