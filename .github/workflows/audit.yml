name: Supply-chain audit

# Advisory: failures surface in the Actions tab and the weekly digest, but
# do NOT gate PRs. Remediation is a follow-up Dependabot or manual bump.

on:
  schedule:
    # Mondays 12:00 UTC.
    - cron: "0 12 * * 1"
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "deny.toml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  checks: write

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: cargo deny check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace --all-features
