apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app.kubernetes.io/name: elena
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: elena
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elena
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.registry }}/worker:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ELENA_POSTGRES__URL
              value: {{ .Values.postgres.url | quote }}
            - name: ELENA_REDIS__URL
              value: {{ .Values.redis.url | quote }}
            - name: ELENA_NATS_URL
              value: {{ .Values.nats.url | quote }}
            - name: ELENA_WORKER__WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ELENA_WORKER__MAX_CONCURRENT_LOOPS
              value: {{ .Values.worker.maxConcurrentLoops | quote }}
            {{- range $i, $ep := .Values.plugins.endpoints }}
            - name: ELENA_WORKER__PLUGINS__ENDPOINTS
              value: {{ $ep | quote }}
            {{- end }}
            {{- if .Values.otel.endpoint }}
            - name: ELENA_OTEL__ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: ELENA_OTEL__SERVICE_NAME
              value: "{{ .Values.otel.serviceName }}-worker"
            - name: ELENA_OTEL__DEPLOYMENT_ENVIRONMENT
              value: {{ .Values.otel.deploymentEnvironment | quote }}
            {{- end }}
          resources:
{{ toYaml .Values.worker.resources | indent 12 }}
