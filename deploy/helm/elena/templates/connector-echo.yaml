{{- if .Values.connector.echo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-connector-echo
  labels:
    app.kubernetes.io/name: elena
    app.kubernetes.io/component: connector-echo
spec:
  replicas: {{ .Values.connector.echo.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: elena
      app.kubernetes.io/component: connector-echo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elena
        app.kubernetes.io/component: connector-echo
    spec:
      containers:
        - name: echo
          image: "{{ .Values.image.registry }}/connector-echo:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 50061
          env:
            - name: ELENA_ECHO_ADDR
              value: "0.0.0.0:50061"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-connector-echo
spec:
  selector:
    app.kubernetes.io/name: elena
    app.kubernetes.io/component: connector-echo
  ports:
    - port: {{ .Values.connector.echo.service.port }}
      targetPort: grpc
      name: grpc
{{- end }}
