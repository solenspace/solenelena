apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app.kubernetes.io/name: elena
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: elena
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elena
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.registry }}/gateway:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ELENA_POSTGRES__URL
              value: {{ .Values.postgres.url | quote }}
            - name: ELENA_REDIS__URL
              value: {{ .Values.redis.url | quote }}
            - name: ELENA_NATS_URL
              value: {{ .Values.nats.url | quote }}
            - name: ELENA_GATEWAY__LISTEN_ADDR
              value: "0.0.0.0:8080"
            - name: ELENA_GATEWAY__JWT__ALGORITHM
              value: {{ .Values.jwt.algorithm | quote }}
            - name: ELENA_GATEWAY__JWT__ISSUER
              value: {{ .Values.jwt.issuer | quote }}
            - name: ELENA_GATEWAY__JWT__AUDIENCE
              value: {{ .Values.jwt.audience | quote }}
            - name: ELENA_GATEWAY__JWT__LEEWAY_SECONDS
              value: {{ .Values.jwt.leewaySeconds | quote }}
            - name: ELENA_GATEWAY__JWT__SECRET_OR_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jwt.secretRef }}
                  key: secret
            {{- if .Values.otel.endpoint }}
            - name: ELENA_OTEL__ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: ELENA_OTEL__SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: ELENA_OTEL__DEPLOYMENT_ENVIRONMENT
              value: {{ .Values.otel.deploymentEnvironment | quote }}
            {{- end }}
          resources:
{{ toYaml .Values.gateway.resources | indent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app.kubernetes.io/name: elena
    app.kubernetes.io/component: gateway
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      name: http
