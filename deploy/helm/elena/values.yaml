# Default values for Elena.
# Override per environment with `-f values.prod.yaml` or `--set`.

image:
  registry: ghcr.io/solen/elena
  tag: "1.0.0"
  pullPolicy: IfNotPresent

gateway:
  replicas: 3
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 512Mi

worker:
  replicas: 4
  maxConcurrentLoops: 500
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

connector:
  echo:
    enabled: true
    replicas: 1
    service:
      port: 50061

# Connection strings. Operator points these at managed services or
# sibling StatefulSets in the same cluster.
postgres:
  url: ""        # postgres://elena:elena@postgres:5432/elena

redis:
  url: ""        # redis://redis:6379

nats:
  url: ""        # nats://nats:4222

# JWT validator. HS256 shared secret OR a JWKS URL (Phase-7 rotation).
jwt:
  algorithm: HS256
  secretRef: elena-jwt-secret
  issuer: elena
  audience: elena-clients
  leewaySeconds: 60
  jwksUrl: ""    # optional; if set, overrides static secret

# TLS cert secret names (Kubernetes Secret refs).
tls:
  enabled: false
  certSecret: ""       # name of a TLS secret; kubernetes.io/tls
  clientCaSecret: ""   # optional; mTLS client-cert verifier

# OpenTelemetry OTLP endpoint. Empty = disabled (stderr logs only).
otel:
  endpoint: ""
  serviceName: elena
  deploymentEnvironment: prod

# Rate limits. u32::MAX / null => unlimited.
rateLimits:
  tenantRpm: null
  tenantInflightMax: null
  providerConcurrency: null
  pluginConcurrency: null

# Plugin endpoints the worker dials at boot.
plugins:
  endpoints: []
