services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: elena
      POSTGRES_PASSWORD: elena
      POSTGRES_DB: elena
    ports:
      - "55432:5432"
    volumes:
      - elena_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elena -d elena"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "54222:4222"
      - "58222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  elena_pg:
